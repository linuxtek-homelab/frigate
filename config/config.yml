mqtt:
  enabled: False

ffmpeg:
  hwaccel_args: preset-intel-qsv-h265
  output_args:
    record: preset-record-generic-audio-copy


detectors:
  ov_0:
    type: openvino
    device: CPU
  ov_1:
    type: openvino
    device: CPU

database:
  path: /media/frigate_db/frigate.db

audio: # <- enable audio events for all camera
  enabled: True

cameras:
  main_floor:
    enabled: False
    ffmpeg:
      inputs:
        - path: rtsp://admin:${FRIGATE_RTSP_PASSWORD}@192.168.25.10:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
  front_porch:
    enabled: False
    ffmpeg:
      inputs:
        - path: rtsp://admin:${FRIGATE_RTSP_PASSWORD}@192.168.25.11:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
  driveway:
    enabled: False
    ffmpeg:
      inputs:
        - path: rtsp://admin:${FRIGATE_RTSP_PASSWORD}@192.168.25.13:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
  backyard:
    enabled: False
    ffmpeg:
      inputs:
        - path: rtsp://admin:${FRIGATE_RTSP_PASSWORD}@192.168.25.13:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
  master_bedroom:
    enabled: False
    ffmpeg:
      inputs:
        - path: rtsp://admin:${FRIGATE_RTSP_PASSWORD}@192.168.25.14:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect
  basement:
    enabled: False
    ffmpeg:
      inputs:
        - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.25.15:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - detect

record:
  enabled: True
  motion:
    days: 30
  alerts:
    retain:
      days: 90
      mode: motion
  detections:
    retain:
      days: 90
      mode: motion

snapshots:
  enabled: True
  retain:
    default: 30